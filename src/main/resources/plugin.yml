name: cross-server
version: '1.0-SNAPSHOT'
main: org.xiaoziyi.crossserver.bootstrap.CrossServerPlugin
api-version: '1.21'
commands:
  crossserver:
    description: cross-server 运维与诊断命令
    usage: /crossserver <help|status|nodes [page]|node <serverId>|modules <list|set|clear>|route <list|menu|set|remove>|routes <list|menu|set|remove>|transfer <player>|transfer help|transfer info <player>|transfer clear <player>|transfer menu <player>|transfer history <player>|transfer recent [page]|transfer reconcile <player>|auth <inspect|invalidate|forcereauth> <player>|reload>
  economy:
    description: economy 调试命令
    usage: /economy <balance|set|deposit|withdraw|history> <player> [amount|limit]
  home:
    description: 传送到默认家园或指定家园
    usage: /home [name]
  homes:
    description: 查看家园列表
    usage: /homes
  sethome:
    description: 设置当前位置为家园
    usage: /sethome <name>
  delhome:
    description: 删除家园
    usage: /delhome <name>
  setdefaulthome:
    description: 设置默认家园
    usage: /setdefaulthome <name>
  login:
    description: 登录账号或完成身份验证
    usage: /login <password>
  l:
    description: 登录账号简写
    usage: /l <password>
  register:
    description: 注册并创建跨服登录账号
    usage: /register <password> <confirm>
  reg:
    description: 注册账号简写
    usage: /reg <password> <confirm>
  tpa:
    description: 请求传送到目标玩家（同服或跨服）
    usage: /tpa <player>
  tpahere:
    description: 邀请目标玩家传送到你这里（同服或跨服）
    usage: /tpahere <player>
  tpaccept:
    description: 接受传送请求
    usage: /tpaccept [player]
  tpdeny:
    description: 拒绝传送请求
    usage: /tpdeny [player]
  tpcancel:
    description: 取消你发出的所有传送请求
    usage: /tpcancel
  warp:
    description: 传送到指定 Warp 或查看 Warp 列表
    usage: /warp [name]
  setwarp:
    description: 设置全局 Warp
    usage: /setwarp <name>
  delwarp:
    description: 删除全局 Warp
    usage: /delwarp <name>
  changepassword:
    description: 修改跨服登录密码
    usage: /changepassword <old> <new>
permissions:
  crossserver.command:
    default: op
  crossserver.status.view:
    default: op
  crossserver.nodes.view:
    default: op
  crossserver.node.view:
    default: op
  crossserver.transfer.view:
    default: op
  crossserver.transfer.clear:
    default: op
  crossserver.transfer.menu:
    default: op
  crossserver.auth.admin:
    default: op
  crossserver.route.view:
    default: op
  crossserver.route.edit:
    default: op
  crossserver.modules.view:
    default: op
  crossserver.modules.edit:
    default: op
  crossserver.reload:
    default: op
  crossserver.economy.balance:
    default: op
  crossserver.economy.history:
    default: op
  crossserver.economy.set:
    default: op
  crossserver.economy.deposit:
    default: op
  crossserver.economy.withdraw:
    default: op
  crossserver.homes.list:
    default: true
  crossserver.homes.menu:
    default: true
  crossserver.homes.teleport:
    default: true
  crossserver.homes.set:
    default: true
  crossserver.homes.delete:
    default: true
  crossserver.homes.default:
    default: true
  crossserver.auth.login:
    default: true
  crossserver.auth.register:
    default: true
  crossserver.auth.changepassword:
    default: true
  crossserver.tpa.use:
    default: true
  crossserver.tpa.here:
    default: true
  crossserver.warps.list:
    default: true
  crossserver.warps.teleport:
    default: true
  crossserver.warps.set:
    default: op
  crossserver.warps.delete:
    default: op
