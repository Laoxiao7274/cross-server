name: cross-server
version: '${project.version}'
main: org.xiaoziyi.crossserver.bootstrap.CrossServerPlugin
api-version: '1.21'
commands:
  crossserver:
    description: cross-server administration and diagnostics command
    aliases: [cs, cr]
    usage: /crossserver <help|status|nodes [page]|node <serverId>|modules <list|set|clear>|route <list|menu|set|remove>|routes <list|menu|set|remove>|transfer <player>|transfer help|transfer info <player>|transfer clear <player>|transfer menu <player>|transfer history <player>|transfer recent [page]|transfer reconcile <player>|auth <inspect|invalidate|forcereauth> <player>|reload>
  economy:
    description: economy administration command
    usage: /economy <balance|set|deposit|withdraw|history> <player> [amount|limit]
  home:
    description: teleport to your default or named home
    usage: /home [name]
  homes:
    description: open the homes menu
    usage: /homes
  sethome:
    description: set the current location as a home
    usage: /sethome <name>
  delhome:
    description: delete a home
    usage: /delhome <name>
  setdefaulthome:
    description: set your default home
    usage: /setdefaulthome <name>
  login:
    description: login or complete authentication
    usage: /login <password>
  l:
    description: shorthand login command
    usage: /l <password>
  register:
    description: register a cross-server login account
    usage: /register <password> <confirm>
  reg:
    description: shorthand register command
    usage: /reg <password> <confirm>
  tpa:
    description: request teleport to another player
    usage: /tpa <player>
  tpahere:
    description: invite another player to teleport to you
    usage: /tpahere <player>
  tpaccept:
    description: accept a teleport request
    usage: /tpaccept [player]
  tpdeny:
    description: deny a teleport request
    usage: /tpdeny [player]
  tpcancel:
    description: cancel your outgoing teleport requests
    usage: /tpcancel
  warp:
    description: teleport to a warp or open the warp menu
    usage: /warp [name]
  setwarp:
    description: create a global warp
    usage: /setwarp <name>
  delwarp:
    description: delete a global warp
    usage: /delwarp <name>
  changepassword:
    description: change your cross-server login password
    usage: /changepassword <old> <new>
  resetpassword:
    description: reset a player's cross-server login password
    usage: /resetpassword <player> <newpassword>
permissions:
  crossserver.command:
    default: op
  crossserver.status.view:
    default: op
  crossserver.nodes.view:
    default: op
  crossserver.node.view:
    default: op
  crossserver.transfer.view:
    default: op
  crossserver.transfer.clear:
    default: op
  crossserver.transfer.menu:
    default: op
  crossserver.transfer.reconcile:
    default: op
  crossserver.auth.admin:
    default: op
  crossserver.route.view:
    default: op
  crossserver.route.edit:
    default: op
  crossserver.modules.view:
    default: op
  crossserver.modules.edit:
    default: op
  crossserver.reload:
    default: op
  crossserver.economy.balance:
    default: op
  crossserver.economy.history:
    default: op
  crossserver.economy.set:
    default: op
  crossserver.economy.deposit:
    default: op
  crossserver.economy.withdraw:
    default: op
  crossserver.homes.list:
    default: true
  crossserver.homes.menu:
    default: true
  crossserver.homes.teleport:
    default: true
  crossserver.homes.set:
    default: true
  crossserver.homes.delete:
    default: true
  crossserver.homes.default:
    default: true
  crossserver.auth.login:
    default: true
  crossserver.auth.register:
    default: true
  crossserver.auth.changepassword:
    default: true
  crossserver.auth.resetpassword:
    default: op
  crossserver.tpa.use:
    default: true
  crossserver.tpa.here:
    default: true
  crossserver.warps.list:
    default: true
  crossserver.warps.teleport:
    default: true
  crossserver.warps.set:
    default: op
  crossserver.warps.delete:
    default: op
